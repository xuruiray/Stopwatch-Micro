name: Bug report
description: Report a reproducible Stopwatch Micro firmware or UI defect.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Stopwatch Micro. Do not include Bluetooth dumps, logs, or screenshots that contain credentials or private conversation content.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Device UI or touch
        - Bluetooth pairing or protocol
        - Physical keys, audio, or haptics
        - Build or dependencies
        - Web review prototype
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Flash commit ...
        2. Pair with ...
        3. Press ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Firmware commit:
        - ESP-IDF version:
        - Host OS / ChatGPT version:
        - Hardware revision:
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Attach relevant serial logs, screenshots, or a short recording after removing private data.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched the existing issues.
          required: true
        - label: I reproduced this on the stated firmware commit.
          required: true
