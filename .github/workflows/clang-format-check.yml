name: clang-format check

on:
  push:
    paths:
      - "**/*.c"
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - ".clang-format"
      - ".github/workflows/clang-format-check.yml"
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - ".clang-format"
      - ".github/workflows/clang-format-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  formatting-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check C and C++ formatting
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: "22"
          check-path: "."
          exclude-regex: "/(components|managed_components|build|main/hal/drivers)/"
